# Vendored skills manifest — 外來 skill 的上游來源
#
# 格式（| 分隔，前後空白會被 trim）：
#   本地目錄名 | 上游 repo URL | ref(branch/tag) | 上游子路徑
#
# 只列「外來、與上游同源、要跟著上游升級」的 skill。
# 自創 skill（wave、grill-me、grill-with-docs）不列此檔——它們是本 repo 的原創，
# 無上游、不做覆蓋同步。
#
# 升級：scripts/sync-vendors.sh check   （dry-run，看上游有什麼更新）
#       scripts/sync-vendors.sh apply   （實際覆蓋，會防本地誤改）
#
# 授權備註：trailofbits/* = CC-BY-SA-4.0（需保留署名+授權，勿洗掉各自 README）；
#           mastepanoski/* = MIT；browserbase/ui-test = 見上游 LICENSE。

insecure-defaults        | https://github.com/trailofbits/skills.git        | main | plugins/insecure-defaults
sharp-edges              | https://github.com/trailofbits/skills.git        | main | plugins/sharp-edges
static-analysis          | https://github.com/trailofbits/skills.git        | main | plugins/static-analysis
ui-test                  | https://github.com/browserbase/skills.git        | main | skills/ui-test
